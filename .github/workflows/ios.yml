name: Build iOS App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          node-version: '24'
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
      - name: Build iOS App
        run: |
          cd ios
          xcodegen generate 2>/dev/null || true
          
          xcodebuild -project MatrixPilot.xcodeproj \
            -scheme MatrixPilot \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MatrixPilot
          path: ios/build/Debug-iphoneos/MatrixPilot.app
          retention-days: 30
