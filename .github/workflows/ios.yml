name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build
        run: |
          cd ios
          which xcodegen || brew install xcodegen
          xcodegen generate
          xcodebuild -project MatrixPilot.xcodeproj \
            -scheme MatrixPilot \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
          
          # 查找构建产物
          find . -name "*.app" -type d
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MatrixPilot
          path: ios/build/Debug-iphonesimulator/MatrixPilot.app
