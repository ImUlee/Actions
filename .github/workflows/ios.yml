name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Build
        run: |
          cd ios
          which xcodegen || brew install xcodegen
          xcodegen generate
          xcodebuild -project MatrixPilot.xcodeproj \
            -scheme MatrixPilot \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build          
      
      - name: Upload
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "MatrixPilot.app" -type d | head -1)
          cp -r "$APP_PATH" ./MatrixPilot.app          
        uses: actions/upload-artifact@v4
        with:
          name: MatrixPilot
          path: ./MatrixPilot.app
